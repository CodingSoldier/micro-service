      # 连接超时时间
      connection-timeout: 20000
      # 测试sql
      connection-test-query: select 1
  cloud:
    # Spring Cloud Loadbalancer 将替代 ribbon
    loadbalancer:
      eager-load:
        clients: cloud-web-02

