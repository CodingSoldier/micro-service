server:
  # 开启优雅停机，默认值：immediate 为立即关闭
  shutdown: graceful
  # 服务端口
  port: 8001
  servlet:
    context-path: /cloud-web-01

spring:
  application:
    name: cloud-web-01
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml
  lifecycle:
    # 停机缓冲时间，默认：30秒
    timeout-per-shutdown-phase: 10s
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: namespace-example-dev
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: namespace-example-dev
        # 实例是否能够接受请求。 默认值是true。
        instance-enabled: false
        # 指定actuator端点的访问路径，因为我们上面配置了服务的前缀 context-path ，所以我们需要将它拼接上，不然路径不对会报错
        # spring-boot-admin配置
        metadata:
          management:
            context-path: ${server.servlet.context-path}/actuator
    # Spring Cloud Loadbalancer 将替代 ribbon
    loadbalancer:
      enabled: true
    # openfeign 的相关配置
    openfeign:
      # feign 开启 gzip 压缩
      compression:
        # 对请求进行压缩
        request:
          enabled: true
          # 针对以下类型的数据进行压缩
          mime-types: text/xml,application/xml,application/json
          # 大于1M的数据才进行压缩
          min-request-size: 1024
        # 响应时进行压缩
        response:
          enabled: true
      client:
        config:
          default:
            read-timeout: 30000
            connect-timeout: 5000
            # 日志级别，取值：NONE、BASIC、HEADERS、FULL，源码位置 feign.Logger.Level
            loggerLevel: BASIC
      #        # feign默认超时时间
      #        connectTimeout: 2000
      #        readTimeout: 5000
      #        writeTimeout: 5000
      # 禁用默认的 http
      httpclient:
        enabled: false
      # 启用 okhttp。
      # feign.okhttp.OkHttpClient.execute打断点查看是否启用okhttp
      okhttp:
        enabled: true
      #开启circuitbreaker和分组激活
      circuitbreaker:
        enabled: true
        group:
          #没开分组永远不用分组的配置。精确优先、分组次之(开了分组)、默认最后
          enabled: true

# 暴露 actuator 端点
# 还需要在拦截器中排除 /actuator/**
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,metrics-requiredMetricName
        exclude:
    # 自定义端点的启用和关闭
    enabled-by-default: true
  endpoint:
    health:
      show-details: ALWAYS
  # 对外暴露tag
  metrics:
    tags:
      application: ${spring.application.name}

# mybatis-plus 配置
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: flag # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: order
    operations-sorter: order
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.github.codingsoldier.example.cloudweb01
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
